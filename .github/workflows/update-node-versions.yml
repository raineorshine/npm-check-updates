name: Update Node.js Versions

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-node-versions:
    name: Update Node.js version matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # commit the updated matrix to a branch
      pull-requests: write # open the pull request

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Update Node.js version matrix
        id: update
        run: node .github/scripts/update-node-matrix.mjs

      - name: Create Pull Request
        if: steps.update.outputs.added != ''
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/update-node-versions
          commit-message: "ci: add Node.js ${{ steps.update.outputs.added }} to the test matrix"
          title: "ci: add Node.js ${{ steps.update.outputs.added }} to the test matrix"
          body: |
            Adds new even (LTS-line) Node.js version(s) to the `test.yml` version matrix: **${{ steps.update.outputs.added }}**.

            Detected from the official [Node.js release schedule](https://raw.githubusercontent.com/nodejs/Release/main/schedule.json).

            This pull request was opened automatically by the [Update Node.js Versions](.github/workflows/update-node-versions.yml) workflow.
          delete-branch: true
