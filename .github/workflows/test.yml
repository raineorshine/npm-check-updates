name: Tests

on:
  push:
    branches:
      - main
      - '!dependabot/**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  FORCE_COLOR: 2

permissions:
  contents: read

jobs:
  run:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.changed_files > 0

    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Corepack is not bundled with Node >= 25.
      # --force is needed to overwrite the runner's preinstalled global yarn.
      - name: Install corepack
        shell: bash
        run: |
          if [[ "$(node -p 'process.versions.node.split(".")[0]')" -ge 25 ]]; then
            npm install -g --force corepack
          fi

      - name: Enable yarn via corepack
        run: corepack enable yarn

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test:unit
        env:
          NODE_OPTIONS: ${{ matrix.os == 'windows-latest' && '--dns-result-order=ipv4first' || '' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Bun Tests
        run: npm run test:bun

      - name: E2E Tests
        run: npm run test:e2e
        if: startsWith(matrix.os, 'ubuntu') && matrix.node == 22
