name: Build

on:
  push:
    branches:
      - main
      - '!dependabot/**'
  pull_request:
    branches:
      - '**'

env:
  FORCE_COLOR: 2
  NODE: 22

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.changed_files > 0

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for uncommitted changes
        run: |
          changed=$(git diff --name-only)
          if [ -n "$changed" ]; then
            files=$(echo "$changed" | tr '\n' ' ' | sed 's/ $//')
            echo "Uncommitted changes detected in $files. Did you forget to run \`npm run build\`?"
            exit 1
          fi
